name: Build Sigil 1.9.30.X5

"on":
  push:
    branches: [main]
    tags: ["v1.9.30.X5"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  SIGIL_VERSION: 1.9.30.X5

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-x64:
    name: Windows x64 (Qt 5)
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: 14.29

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 5.15.2
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtwebengine
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.9.9
          architecture: x64
          cache: pip
          cache-dependency-path: .github/workflows/build.yml

      - name: Install Python payload and packaging tools
        shell: pwsh
        run: |
          python -m pip install --upgrade "pip<25"
          python -m pip install --only-binary=:all: --progress-bar off `
            "PyQt5==5.15.2" `
            "PyQtWebEngine==5.15.2" `
            "PyQt5-sip==12.8.1"
          python -m pip install --only-binary=:all: --progress-bar off `
            "six==1.16.0" `
            "html5lib==1.1" `
            "regex==2021.11.10" `
            "css-parser==1.0.7" `
            "cssselect==1.1.0" `
            "urllib3==1.26.7" `
            "certifi==2021.10.8" `
            "dulwich==0.20.46" `
            "chardet==4.0.0" `
            "Pillow==8.4.0" `
            "lxml==4.7.1"
          "${env:ProgramFiles(x86)}\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $redist = Join-Path $env:VCToolsRedistDir "vc_redist.x64.exe"
          if (-not (Test-Path $redist)) {
            throw "Current MSVC x64 redistributable was not found at $redist"
          }
          Copy-Item -LiteralPath $redist -Destination installer\vcredist_x64.exe -Force

      - name: Configure
        shell: pwsh
        run: |
          $pythonRoot = $env:pythonLocation -replace '\\', '/'
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 `
            -DTRY_NEWER_FINDPYTHON3=ON `
            -DPKG_SYSTEM_PYTHON=1 `
            -DPACKAGE_PYQT5=1 `
            -DWIN_INSTALLER_USE_64BIT_CRT=1 `
            "-DPython3_ROOT_DIR=$pythonRoot" `
            "-DPython3_EXECUTABLE=$pythonRoot/python.exe" `
            "-DQt5_DIR=$env:QT_ROOT_DIR\lib\cmake\Qt5"

      - name: Set numeric Windows file version
        shell: pwsh
        run: |
          $iss = "build\Sigil_configured.iss"
          $content = Get-Content $iss -Raw
          if ($content -notmatch '(?m)^VersionInfoVersion=1\.9\.30\.X5\r?$') {
            throw "Expected X5 VersionInfoVersion was not found"
          }
          $content = $content -replace `
            '(?m)^VersionInfoVersion=1\.9\.30\.X5\r?$', `
            'VersionInfoVersion=1.9.30.5'
          [IO.File]::WriteAllText(
            (Resolve-Path $iss),
            $content,
            [Text.UTF8Encoding]::new($false)
          )

      - name: Build Windows installer
        run: cmake --build build --target makeinstaller --parallel 2

      - name: Verify Windows installer
        shell: pwsh
        run: |
          $installer = "build\installer\Sigil-$env:SIGIL_VERSION-Windows-x64-Setup.exe"
          if (-not (Test-Path $installer)) {
            throw "Expected installer was not generated: $installer"
          }
          Get-Item $installer | Format-List Name,Length,LastWriteTime

      - name: Upload compiled package
        uses: actions/upload-artifact@v6
        with:
          name: Sigil-1.9.30.X5-windows-x64
          path: build/installer/Sigil-1.9.30.X5-Windows-x64-Setup.exe
          if-no-files-found: error
          retention-days: 14

  windows-x86:
    name: Windows x86 (Qt 5)
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86
          toolset: 14.29

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 5.15.2
          host: windows
          target: desktop
          arch: win32_msvc2019
          modules: qtwebengine
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.9.9
          architecture: x86
          cache: pip
          cache-dependency-path: .github/workflows/build.yml

      - name: Install Python payload and packaging tools
        shell: pwsh
        run: |
          python -m pip install --upgrade "pip<25"
          python -m pip install --only-binary=:all: --progress-bar off `
            "PyQt5==5.15.2" `
            "PyQtWebEngine==5.15.2" `
            "PyQt5-sip==12.8.1"
          python -m pip install --only-binary=:all: --progress-bar off `
            "six==1.16.0" `
            "html5lib==1.1" `
            "regex==2021.11.10" `
            "css-parser==1.0.7" `
            "cssselect==1.1.0" `
            "urllib3==1.26.7" `
            "certifi==2021.10.8" `
            "dulwich==0.20.46" `
            "chardet==4.0.0" `
            "Pillow==8.4.0" `
            "lxml==4.7.1"
          "${env:ProgramFiles(x86)}\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $redist = Join-Path $env:VCToolsRedistDir "vc_redist.x86.exe"
          if (-not (Test-Path $redist)) {
            throw "Current MSVC x86 redistributable was not found at $redist"
          }
          Copy-Item -LiteralPath $redist -Destination installer\vcredist_x86.exe -Force

      - name: Configure
        shell: pwsh
        run: |
          $pythonRoot = $env:pythonLocation -replace '\\', '/'
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 `
            -DTRY_NEWER_FINDPYTHON3=ON `
            -DPKG_SYSTEM_PYTHON=1 `
            -DPACKAGE_PYQT5=1 `
            -DWIN_INSTALLER_USE_64BIT_CRT=0 `
            -DSYS_DLL_DIR=C:/Windows/SysWOW64 `
            "-DPython3_ROOT_DIR=$pythonRoot" `
            "-DPython3_EXECUTABLE=$pythonRoot/python.exe" `
            "-DQt5_DIR=$env:QT_ROOT_DIR\lib\cmake\Qt5"

      - name: Set numeric Windows file version
        shell: pwsh
        run: |
          $iss = "build\Sigil_configured.iss"
          $content = Get-Content $iss -Raw
          if ($content -notmatch '(?m)^VersionInfoVersion=1\.9\.30\.X5\r?$') {
            throw "Expected X5 VersionInfoVersion was not found"
          }
          $content = $content -replace `
            '(?m)^VersionInfoVersion=1\.9\.30\.X5\r?$', `
            'VersionInfoVersion=1.9.30.5'
          [IO.File]::WriteAllText(
            (Resolve-Path $iss),
            $content,
            [Text.UTF8Encoding]::new($false)
          )

      - name: Build Windows installer
        run: cmake --build build --target makeinstaller --parallel 2

      - name: Verify Windows installer
        shell: pwsh
        run: |
          $generated = "build\installer\Sigil-$env:SIGIL_VERSION-Windows-Setup.exe"
          $installer = "build\installer\Sigil-$env:SIGIL_VERSION-Windows-x86-Setup.exe"
          if (-not (Test-Path $generated)) {
            throw "Expected installer was not generated: $generated"
          }
          Move-Item -LiteralPath $generated -Destination $installer -Force
          Get-Item $installer | Format-List Name,Length,LastWriteTime

      - name: Upload compiled package
        uses: actions/upload-artifact@v6
        with:
          name: Sigil-1.9.30.X5-windows-x86
          path: build/installer/Sigil-1.9.30.X5-Windows-x86-Setup.exe
          if-no-files-found: error
          retention-days: 14

  macos-x86_64:
    name: macOS x86_64 (Qt 5)
    runs-on: macos-15-intel
    timeout-minutes: 120

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 5.15.2
          host: mac
          target: desktop
          arch: clang_64
          modules: qtwebengine
          cache: true

      - name: Install framework Python and payload
        shell: bash
        run: |
          PYTHON_ROOT="/Library/Frameworks/Python.framework/Versions/3.11"
          if [[ ! -x "${PYTHON_ROOT}/bin/python3.11" ]]; then
            brew install python@3.11 || true
            PYTHON_ROOT="$(brew --prefix python@3.11)/Frameworks/Python.framework/Versions/3.11"
          fi
          PYTHON_BIN="${PYTHON_ROOT}/bin/python3.11"
          test -x "${PYTHON_BIN}"
          "${PYTHON_BIN}" -m pip install --break-system-packages \
            "PyQt5==5.15.10" \
            "PyQtWebEngine==5.15.7" \
            lxml six html5lib Pillow regex certifi cssselect urllib3 dulwich encutils css-parser webencodings chardet
          echo "PYTHON_ROOT=${PYTHON_ROOT}" >> "${GITHUB_ENV}"
          echo "PYTHON_BIN=${PYTHON_BIN}" >> "${GITHUB_ENV}"

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}/lib/cmake" \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DTRY_NEWER_FINDPYTHON3=ON \
            -DPKG_SYSTEM_PYTHON=1 \
            -DPython3_ROOT_DIR="${PYTHON_ROOT}" \
            -DPython3_EXECUTABLE="${PYTHON_BIN}"

      - name: Build application and deploy frameworks
        shell: bash
        run: |
          cmake --build build --parallel 2
          cmake --build build --target addframeworks

      - name: Fix plugin rpaths and create DMG
        shell: bash
        run: |
          while IFS= read -r -d '' plugin; do
            if ! otool -l "${plugin}" | grep -Fq '@loader_path/../../Frameworks'; then
              install_name_tool -add_rpath '@loader_path/../../Frameworks' "${plugin}"
            fi
          done < <(find build/bin/Sigil.app/Contents/PlugIns -type f -name '*.dylib' -print0)
          cmake --build build --target makedmg
          test -f build/bin/Sigil.dmg
          hdiutil verify build/bin/Sigil.dmg
          mv build/bin/Sigil.dmg "Sigil-${SIGIL_VERSION}-macos-x86_64.dmg"

      - name: Upload compiled package
        uses: actions/upload-artifact@v6
        with:
          name: Sigil-1.9.30.X5-macos-x86_64
          path: Sigil-1.9.30.X5-macos-x86_64.dmg
          if-no-files-found: error
          retention-days: 14

  macos-arm64:
    name: macOS ARM64 (Qt 6)
    runs-on: macos-15
    timeout-minutes: 150

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.5.3
          host: mac
          target: desktop
          arch: clang_64
          modules: qt5compat qtpositioning qtwebchannel qtwebengine
          cache: true

      - name: Install framework Python and payload
        shell: bash
        run: |
          test "$(uname -m)" = "arm64"
          PYTHON_ROOT="/Library/Frameworks/Python.framework/Versions/3.11"
          if [[ ! -x "${PYTHON_ROOT}/bin/python3.11" ]]; then
            brew install python@3.11 || true
            PYTHON_ROOT="$(brew --prefix python@3.11)/Frameworks/Python.framework/Versions/3.11"
          fi
          PYTHON_BIN="${PYTHON_ROOT}/bin/python3.11"
          test -x "${PYTHON_BIN}"
          "${PYTHON_BIN}" -m pip install --break-system-packages \
            "PySide6==6.5.3" \
            lxml six html5lib Pillow regex certifi cssselect urllib3 dulwich encutils css-parser webencodings chardet
          echo "PYTHON_ROOT=${PYTHON_ROOT}" >> "${GITHUB_ENV}"
          echo "PYTHON_BIN=${PYTHON_BIN}" >> "${GITHUB_ENV}"

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}/lib/cmake" \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DUSE_QT6=1 \
            -DTRY_NEWER_FINDPYTHON3=ON \
            -DPKG_SYSTEM_PYTHON=1 \
            -DPython3_ROOT_DIR="${PYTHON_ROOT}" \
            -DPython3_EXECUTABLE="${PYTHON_BIN}"

      - name: Build application and deploy frameworks
        shell: bash
        run: |
          cmake --build build --parallel 2
          cmake --build build --target addframeworks

      - name: Fix plugin rpaths and create DMG
        shell: bash
        run: |
          while IFS= read -r -d '' plugin; do
            if ! otool -l "${plugin}" | grep -Fq '@loader_path/../../Frameworks'; then
              install_name_tool -add_rpath '@loader_path/../../Frameworks' "${plugin}"
            fi
          done < <(find build/bin/Sigil.app/Contents/PlugIns -type f -name '*.dylib' -print0)
          file build/bin/Sigil.app/Contents/MacOS/Sigil | grep -Fq arm64
          cmake --build build --target makedmg
          test -f build/bin/Sigil.dmg
          hdiutil verify build/bin/Sigil.dmg
          mv build/bin/Sigil.dmg "Sigil-${SIGIL_VERSION}-macos-arm64.dmg"

      - name: Upload compiled package
        uses: actions/upload-artifact@v6
        with:
          name: Sigil-1.9.30.X5-macos-arm64
          path: Sigil-1.9.30.X5-macos-arm64.dmg
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows-x64, windows-x86, macos-x86_64, macos-arm64]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download compiled packages
        uses: actions/download-artifact@v6
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release and upload packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --title "Sigil ${SIGIL_VERSION}" \
            --generate-notes
